<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="200" cy="200" r="190" fill="url(#grad1)"/>
  
  <!-- White Circle Background for Logo -->
  <circle cx="200" cy="200" r="170" fill="#ffffff"/>
  
  <!-- HireTrades Text -->
  <text x="200" y="140" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="bold" 
        fill="#1e3a8a" text-anchor="middle">HireTrades</text>
  
  <!-- Tool Icons -->
  <g transform="translate(200, 220)">
    <!-- Hammer -->
    <g transform="translate(-50, 0)">
      <rect x="-5" y="-30" width="10" height="50" fill="#1e3a8a" rx="2"/>
      <rect x="-20" y="-35" width="40" height="12" fill="#2563eb" rx="2"/>
    </g>
    
    <!-- Wrench -->
    <g transform="translate(30, 0)">
      <path d="M 0 -30 L 0 0 L 10 10 L 20 0 L 10 -10 L 5 -5 L 5 -30 Z" 
            fill="#1e3a8a"/>
      <circle cx="15" cy="-5" r="8" fill="none" stroke="#2563eb" stroke-width="3"/>
    </g>
    
    <!-- Screwdriver -->
    <g transform="translate(-10, 0)">
      <rect x="-3" y="-25" width="6" height="40" fill="#3b82f6" rx="1"/>
      <polygon points="-8,-30 8,-30 3,-25 -3,-25" fill="#1e3a8a"/>
    </g>
  </g>
  
  <!-- Tagline -->
  <text x="200" y="280" font-family="Arial, Helvetica, sans-serif" font-size="18" 
        fill="#2563eb" text-anchor="middle">Professional Trades</text>
  
  <!-- Outer Ring -->
  <circle cx="200" cy="200" r="190" fill="none" stroke="#ffffff" stroke-width="4"/>
</svg>
